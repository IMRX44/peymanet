# Peymanet — one command to run the whole app: `docker compose up --build`
# Then open http://localhost:3000
#
# Default = MOCK AI (no API key needed) on SQLite.
# To go live, create a .env next to this file and set AI_MODE=live plus the
# variables for your provider (see README → "AI providers"). Examples:
#     AI_MODE=live AI_PROVIDER=openai              OPENAI_API_KEY=sk-...
#     AI_MODE=live AI_PROVIDER=openai-compatible   OPENAI_API_KEY=... OPENAI_BASE_URL=https://gateway/v1
#     AI_MODE=live AI_PROVIDER=google              GOOGLE_API_KEY=AIza...
#     AI_MODE=live AI_PROVIDER=anthropic           ANTHROPIC_API_KEY=sk-ant-...
#     AI_MODE=live AI_PROVIDER=azure               AZURE_API_KEY=... AZURE_RESOURCE_NAME=... OPENAI_MODEL=<deployment>
# To use PostgreSQL in production: switch the provider in prisma/schema.prisma to
# "postgresql", point DATABASE_URL at the db service, and uncomment `db` below.

services:
  app:
    build: .
    container_name: peymanet
    ports:
      - "3000:3000"
    environment:
      # Database — defaults to a SQLite file persisted on the `peymanet-data`
      # volume below (survives `up --build`). For Postgres: uncomment the `db`
      # service + the `depends_on` block, switch the Prisma datasource provider
      # to "postgresql" in prisma/schema.prisma, and set DATABASE_URL, e.g.:
      #   DATABASE_URL=postgresql://peymanet:peymanet@db:5432/peymanet?schema=public
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/dev.db}
      # Engine selection
      AI_MODE: ${AI_MODE:-mock}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      # OpenAI + any OpenAI-compatible endpoint (reseller / proxy / gateway / OpenRouter / local)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_MODEL_FAST: ${OPENAI_MODEL_FAST:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_HEADERS: ${OPENAI_HEADERS:-}
      # Google Gemini
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-}
      GOOGLE_MODEL_FAST: ${GOOGLE_MODEL_FAST:-}
      # Anthropic Claude
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      ANTHROPIC_MODEL_FAST: ${ANTHROPIC_MODEL_FAST:-}
      # Azure OpenAI
      AZURE_RESOURCE_NAME: ${AZURE_RESOURCE_NAME:-}
      AZURE_API_KEY: ${AZURE_API_KEY:-}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-}
      AZURE_BASE_URL: ${AZURE_BASE_URL:-}
      # App
      APP_SECRET: ${APP_SECRET:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-fa}
    volumes:
      # Persists the SQLite database across container rebuilds. (Harmless when
      # using Postgres — the app just won't write anything here.)
      - peymanet-data:/app/data
    # For Postgres, uncomment this so the app waits for the db to be ready:
    # depends_on:
    #   db:
    #     condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL (optional, for production) ──
  # To use: uncomment this service, uncomment `depends_on` above, set the app's
  # DATABASE_URL to the postgres:// URL, switch the Prisma provider to
  # "postgresql", then `docker compose up --build`.
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: peymanet
  #     POSTGRES_USER: peymanet
  #     POSTGRES_PASSWORD: peymanet
  #   ports: ["5432:5432"]
  #   volumes: ["pgdata:/var/lib/postgresql/data"]
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U peymanet"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10

volumes:
  peymanet-data:
  # pgdata:
